name: Test LLM AI Node.js templates

on:
  workflow_call:

jobs:
  test-llm-ai-node-templates:
    name: Test LLM AI Node.js templates
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        node-version: [22]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm and dependencies
        uses: apify/workflows/pnpm-install@v0.41.1

      - name: Install apify CLI globally
        run: npm install -g apify-cli

      - name: Test LLM AI Node.js templates
        run: pnpm run test-llm-ai-node-templates
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TEST_USER_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.APIFY_SERVICE_ACCOUNT_OPENAI_API_KEY }}
