name: Test Python templates

on:
  workflow_call:

jobs:
  test-python-templates:
    name: Test Python templates
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install pnpm and dependencies
        uses: apify/workflows/pnpm-install@v0.41.1

      - name: Install apify CLI globally
        run: npm install -g apify-cli

      - name: Install playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Used by the uv-based templates (e.g. python-uv). uv installs the Python version
      # pinned in the template's .python-version file on its own, so it intentionally
      # does not get the matrix Python version passed in.
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Chrome and Chromedriver
        # Use pnpm dlx instead of npx — npx is the npm CLI and trips
        # devEngines.packageManager=pnpm at the repo root.
        run: |
          pnpm dlx @puppeteer/browsers install chrome
          pnpm dlx @puppeteer/browsers install chromedriver

      - name: Test Python templates
        run: pnpm run test-python-templates
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TEST_USER_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.APIFY_SERVICE_ACCOUNT_OPENAI_API_KEY }}
