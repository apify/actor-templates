name: Test LLM AI Python templates

on:
  workflow_call:

jobs:
  test-llm-ai-python-templates:
    name: Test LLM AI Python templates
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Install pnpm and dependencies
        uses: apify/workflows/pnpm-install@v0.41.1

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: templates/**/requirements.txt

      - name: Test LLM AI Python templates
        run: pnpm run test-llm-ai-python-templates
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TEST_USER_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.APIFY_SERVICE_ACCOUNT_OPENAI_API_KEY }}
