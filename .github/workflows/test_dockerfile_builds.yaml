name: Test Docker builds

on:
  workflow_dispatch:
  workflow_call:

jobs:
  find-and-test-dockerfiles:
    strategy:
      matrix:
        # Each shard builds a round-robin slice of the Dockerfiles,
        # see scripts/test_docker_builds.sh.
        shard: ['1/4', '2/4', '3/4', '4/4']
      fail-fast: false
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        # Only the fast rm -rf part of the old "maximize disk space" step — the
        # apt-get purge took minutes and with ~11 builds per shard (plus the
        # disk-pressure prune in the build script) this headroom is enough.
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/lib/jvm /usr/local/share/powershell /usr/local/share/boost

      - name: Test Dockerfile builds
        shell: bash
        run: ./scripts/test_docker_builds.sh ${{ matrix.shard }}
