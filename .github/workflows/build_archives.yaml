name: Build template archives

on:
  push:
    paths-ignore:
      - 'dist/**'
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      # TODO: Also replace links in manifest.json
      - name: Build template archives
        run: npm run build

      - name: Stage the updated template archives
        id: stage
        run: |
          git add dist/* templates/*
          if git diff --cached --quiet; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit the updated template archives
        if: steps.stage.outputs.has-changes == 'true'
        uses: apify/workflows/commit@v0.44.0
        with:
          commit-message: 'chore: Update template archives [skip ci]'
          github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
